# ── Database (MongoDB Cloud) ─────────────────────
spring.data.mongodb.uri=mongodb+srv://user:jU5WNBcw3dO3G3BL@cluster0.v6wxgah.mongodb.net/smart_campus_db?appName=Cluster0

# ── Security (JWT) ───────────────────────────────
jwt.secret=9a4f2c8d3e1f5b6a7c0e9d8f7a6b5c4d3e2f1a0b9c8d7e6f5a4b3c2d1e0f9a8b
jwt.expiration-ms=1800000

# ── OAuth2 Microsoft (Azure AD) ──────────────────────
# 1. Register App in Azure Portal (App Registrations)
# 2. Add Redirect URI: http://localhost:8082/login/oauth2/code/microsoft
# 3. Replace the values below with your Azure credentials
spring.security.oauth2.client.registration.microsoft.client-id=YOUR_AZURE_CLIENT_ID
spring.security.oauth2.client.registration.microsoft.client-secret=YOUR_AZURE_CLIENT_SECRET
spring.security.oauth2.client.registration.microsoft.scope=openid, profile, email
spring.security.oauth2.client.registration.microsoft.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.microsoft.authorization-grant-type=authorization_code

# Microsoft OIDC Provider — Replace {tenant-id} with SLIIT tenant ID or 'common'
spring.security.oauth2.client.provider.microsoft.issuer-uri=https://login.microsoftonline.com/common/v2.0
