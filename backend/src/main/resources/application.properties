spring.application.name=smart-campus-api
server.port=8080

# ── MongoDB ──────────────────────────────────────
# Mongo will create the database automatically on first write.
spring.data.mongodb.uri=mongodb://localhost:27017/smart_campus

# ── JWT ───────────────────────────────────────────
jwt.secret=SmartCampus_SuperSecret_JWT_Key_2024_ChangeThisInProd!
jwt.expiration-ms=86400000

